<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - 5 Minutes</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f6f0ee;
            font-family: 'Inter', sans-serif;
        }

        .main-container {
            width: 95%;
            max-width: 1000px;
            height: 90vh;
            background-color: #ffffff;
            display: flex;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .left-side {
            width: 40%;
            background: url('https://picsum.photos/id/10/800/1200') no-repeat center;
            background-size: cover;
            margin: 15px;
            border-radius: 15px;
        }

        .right-side {
            width: 60%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-placeholder {
            width: 120px;
            margin-bottom: 10px;
        }

        .form-container {
            width: 100%;
            max-width: 400px;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            margin-bottom: 15px;
            color: #000;
        }

        .terms-text {
            font-size: 11px;
            color: #555;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        /* TOMBOL GOOGLE */
        .btn-google {
            width: 100%;
            padding: 12px;
            background-color: #ffffff;
            border: 1px solid #ddd;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            color: #333;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .btn-google:hover {
            background-color: #f9f9f9;
            border-color: #bbb;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin-bottom: 20px;
            color: #aaa;
            font-size: 12px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #eee;
        }

        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }

        /* FORM INPUT */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 8px;
            color: #000;
        }

        .input-group input {
            width: 100%;
            padding: 15px;
            border: 1px solid #000;
            font-size: 16px;
            outline: none;
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background-color: #000;
            color: #fff;
            border: none;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-submit:hover {
            background-color: #333;
        }

        .forgot-password {
            display: block;
            text-align: right;
            margin-top: 15px;
            font-size: 14px;
            color: #000;
            text-decoration: none;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .left-side { display: none; }
            .right-side { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="left-side"></div>

        <div class="right-side">
            <div class="logo-section">
                <img src="5menit.png" alt="Logo" class="logo-placeholder">
            </div>

            <div class="form-container">
                <h2>Masuk atau buat akun</h2>
                
                <p class="terms-text">
                    Dengan melanjutkan, Anda menyetujui Perjanjian Pengguna kami dan mengakui Kebijakan Privasi kami.
                </p>

                <a href="logingoogle.html" class="btn-google">
                    <svg width="20" height="20" viewBox="0 0 48 48">
                        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
                        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
                        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
                        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
                    </svg>
                    Lanjutkan dengan Google
                </a>

                <div class="divider">atau</div>

                <form action="login(sandi).html" method="POST">
                    <div class="input-group">
                        <label for="password">Kata Sandi</label>
                        <input type="password" id="password" name="password" required>
                    </div>

                    <button type="submit" class="btn-submit">MASUK</button>
                    
                    <a href="#" class="forgot-password">Lupa kata Sandi?</a>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
