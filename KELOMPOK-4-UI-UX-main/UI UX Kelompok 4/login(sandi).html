<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - 5 Minutes</title>

    <style>
        /* RESET & BASE */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
        }

        body {
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* BAGIAN KIRI */
        .left {
            width: 50%;
            background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.4)), 
                        url('https://picsum.photos/800/1000') no-repeat center;
            background-size: cover;
            position: relative;
            display: flex;
            align-items: flex-end;
            padding: 60px;
        }

        .overlay {
            color: white;
        }

        .overlay h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        /* BAGIAN KANAN */
        .right {
            width: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fff;
        }

        .form-box {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .form-box h2 {
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .desc {
            font-size: 13px;
            margin-bottom: 25px;
            color: #666;
            line-height: 1.4;
        }

        form label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
        }

        form input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
        }

        form button[type="submit"] {
            width: 100%;
            padding: 14px;
            background: black;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* DIVIDER */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 25px 0;
            color: #999;
            font-size: 13px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #eee;
        }

        .divider:not(:empty)::before { margin-right: 15px; }
        .divider:not(:empty)::after { margin-left: 15px; }

        /* SOCIAL BUTTONS */
        .social-container {
            display: flex;
            justify-content: space-between;
            gap: 12px;
        }

        /* Link Wrapper agar area klik seluas kotak */
        .social-link {
            flex: 1;
            text-decoration: none;
            color: inherit;
        }

        .btn-social {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 15px 5px;
            border: 1px solid #eee;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .btn-social:hover {
            background: #f8f9fa;
            border-color: #ccc;
            transform: translateY(-2px);
        }

        .btn-social img {
            width: 24px;
            height: 24px;
            object-fit: contain;
        }

        @media (max-width: 768px) {
            .left { display: none; }
            .right { width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="left">
        <div class="overlay">
            <h1>Jadilah yang paling tahu.</h1>
            <p>Bergabunglah dengan komunitas kami hari ini.</p>
        </div>
    </div>

    <div class="right">
        <div class="form-box">
            <h2>Masuk atau buat akun</h2>
            <p class="desc">Dengan melanjutkan, Anda menyetujui syarat & kebijakan kami.</p>

            <form action="login.html" method="POST">
            <label>Alamat Email</label>
            <input type="email" name="email" placeholder="Masukkan email" required>
            
            <button type="submit">LANJUTKAN</button>
        </form>

                <div class="divider">atau lanjut dengan</div>
                

                <div class="social-container">
                    <a href="logingoogle.html" class="social-link">
                        <button type="button" class="btn-social">
                            <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/24px.svg" alt="Google">
                            Google   
                        </button>
                    </a>
                    
                    <a href="loginapple.html" class="social-link">
                        <button type="button" class="btn-social">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" alt="Apple">
                            Apple
                        </button>
                    </a>

                    <a href="loginfacebook.html" class="social-link">
                        <button type="button" class="btn-social">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" alt="Facebook">
                            Facebook
                        </button>
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
