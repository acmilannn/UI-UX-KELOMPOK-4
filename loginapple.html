<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in with Apple - Connected Apps</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: rgba(0, 0, 0, 0.4);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Modal Container */
        .apple-modal {
            background: white;
            border-radius: 10px;
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        /* Header Section */
        .modal-header {
            padding: 40px 30px 20px;
            text-align: center;
            border-bottom: 1px solid #f0f0f0;
        }

        .apple-logo-container {
            width: 54px;
            height: 54px;
            background: linear-gradient(135deg, #007AFF 0%, #5856D6 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }

        .apple-logo {
            width: 32px;
            height: 32px;
            fill: white;
        }

        .modal-title {
            font-size: 21px;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 8px;
        }

        .modal-subtitle {
            font-size: 15px;
            color: #86868b;
            margin-bottom: 12px;
        }

        /* Apps List */
        .apps-list {
            padding: 10px 0;
            max-height: 50vh;
            overflow-y: auto;
        }

        /* Styling Link sebagai Tombol Baris */
        .app-link {
            text-decoration: none; /* Menghilangkan garis bawah default */
            display: flex;
            align-items: center;
            padding: 16px 30px;
            border-bottom: 1px solid #f0f0f0;
            transition: background-color 0.2s;
        }

        .app-link:hover {
            background-color: #f8f8f8;
        }

        .app-link:last-child {
            border-bottom: none;
        }

        .app-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #1d1d1f 0%, #434344 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            flex-shrink: 0;
        }

        .app-icon svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        .app-name {
            flex: 1;
            font-size: 16px;
            color: #1d1d1f;
            font-weight: 400;
        }

        .app-arrow {
            color: #c7c7cc;
            font-size: 18px;
        }

        /* Dark Mode Support */
        @media (prefers-color-scheme: dark) {
            .apple-modal { background: #1c1c1e; }
            .modal-title, .app-name { color: #f5f5f7; }
            .modal-header, .app-link { border-bottom-color: #38383a; }
            .app-link:hover { background-color: #2c2c2e; }
        }
    </style>
</head>
<body>

    <div class="apple-modal">
        <div class="modal-header">
            <div class="apple-logo-container">
                <svg class="apple-logo" viewBox="0 0 24 24">
                    <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.1 2.48-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .76-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
                </svg>
            </div>
            <h1 class="modal-title">Sign in with Apple</h1>
            <p class="modal-subtitle">Terhubung dengan Aplikasi</p>
        </div>

        <div class="apps-list">
            
            <a href="login(selamat).html" class="app-link">
                <div class="app-icon"><svg viewBox="0 0 24 24"><path d="M12 2L2 22h20L12 2z"/></svg></div>
                <span class="app-name">Adobe</span>
                <span class="app-arrow">›</span>
            </a>

            <a href="login(selamat).html" class="app-link">
                <div class="app-icon"><svg viewBox="0 0 24 24"><path d="M12 2L2 22h20L12 2z"/></svg></div>
                <span class="app-name">Adobe XD</span>
                <span class="app-arrow">›</span>
            </a>

            <a href="login(selamat).html" class="app-link">
                <div class="app-icon"><svg viewBox="0 0 24 24"><path d="M12 2L2 22h20L12 2z"/></svg></div>
                <span class="app-name">Bluebird Production App</span>
                <span class="app-arrow">›</span>
            </a>

            <a href="login(selamat).html" class="app-link">
                <div class="app-icon"><svg viewBox="0 0 24 24"><path d="M12 2L2 22h20L12 2z"/></svg></div>
                <span class="app-name">Canva</span>
                <span class="app-arrow">›</span>
            </a>

            <a href="login(selamat).html" class="app-link">
                <div class="app-icon"><svg viewBox="0 0 24 24"><path d="M12 2L2 22h20L12 2z"/></svg></div>
                <span class="app-name">Capshot iOS Official</span>
                <span class="app-arrow">›</span>
            </a>

        </div>
    </div>

</body>
</html>
